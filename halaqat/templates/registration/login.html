{% extends "halaqat/base.html" %}
{% load static %}
{% block title %}تسجيل الدخول - مسجد طه{% endblock %}
{% block content %}
<div class="login-wrap">
  <div class="login-card">
    <div class="login-emblem">
      <img src="{% static 'halaqat/images/logo.svg' %}" alt="شعار مسجد طه">
    </div>
    <h1>تسجيل الدخول</h1>
    <p>الدخول مخصص لمشرف المسجد فقط</p>

    {% if form.errors %}
      <div class="form-errors">اسم المستخدم أو كلمة المرور غير صحيحة</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="field">
        <label for="id_username">اسم المستخدم</label>
        <input type="text" name="username" id="id_username" placeholder="ادخل اسم المستخدم" required autofocus>
      </div>
      <div class="field">
        <label for="id_password">كلمة المرور</label>
        <input type="password" name="password" id="id_password" placeholder="••••••••" required>
      </div>
      <input type="hidden" name="next" value="{{ next }}">
      <button type="submit" class="btn-primary">دخول</button>
    </form>

    <div class="login-hint">حساب اداري</div>
  </div>
</div>
{% endblock %}
